<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dumbbell Home Workout — Upper/Lower Split</title>
<meta name="description" content="4-day dumbbell-only home workout program. Upper/Lower split, ~10 sets per muscle group, 2x frequency.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0e0e0e;--surface:#1a1a1a;--surface2:#242424;
  --accent:#ff4d00;--accent2:#ff7a33;
  --text:#f0ece6;--text-dim:#8a8680;--border:#2e2e2e;
  --green:#3ecf5a;--blue:#3ea8cf;--purple:#a06ecf;
}
body{background:var(--bg);color:var(--text);font-family:'Source Sans 3',sans-serif;line-height:1.6}
.hero{position:relative;padding:60px 20px 40px;text-align:center;background:linear-gradient(180deg,#1a1a1a,#0e0e0e);border-bottom:3px solid var(--accent)}
.hero::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 50% 80%,rgba(255,77,0,.08) 0%,transparent 50%);pointer-events:none}
.hero h1{font-family:'Oswald',sans-serif;font-weight:700;font-size:clamp(2rem,5vw,3.5rem);text-transform:uppercase;letter-spacing:3px;position:relative}
.hero h1 span{color:var(--accent)}
.hero p{margin-top:12px;font-size:1.05rem;color:var(--text-dim);font-weight:300}
.stats-bar{display:flex;justify-content:center;gap:30px;margin-top:28px;flex-wrap:wrap}
.stat-value{font-family:'Oswald',sans-serif;font-size:1.6rem;font-weight:600;color:var(--accent)}
.stat-label{font-size:.75rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-dim)}
.container{max-width:1100px;margin:0 auto;padding:30px 16px 60px}
.day-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:28px;overflow:hidden;transition:border-color .3s}
.day-card:hover{border-color:var(--accent)}
.day-header{padding:20px 24px;display:flex;align-items:center;gap:16px;cursor:pointer;user-select:none}
.day-badge{font-family:'Oswald',sans-serif;font-weight:700;font-size:.85rem;text-transform:uppercase;letter-spacing:1px;padding:6px 14px;border-radius:6px;white-space:nowrap;color:#fff}
.c1 .day-badge{background:var(--accent)}.c2 .day-badge{background:var(--blue)}
.c4 .day-badge{background:var(--purple)}.c5 .day-badge{background:var(--green);color:#000}
.day-title{font-family:'Oswald',sans-serif;font-size:clamp(1rem,2.5vw,1.3rem);font-weight:600;text-transform:uppercase;letter-spacing:1px}
.day-toggle{margin-left:auto;font-size:1.4rem;color:var(--text-dim);transition:transform .3s}
.day-card.open .day-toggle{transform:rotate(180deg)}
.day-content{display:none;padding:0 24px 24px}
.day-card.open .day-content{display:block}
.mg{margin-bottom:20px}
.mg-h{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.mg-name{font-family:'Oswald',sans-serif;font-size:1.05rem;font-weight:500;text-transform:uppercase;letter-spacing:1px;color:var(--accent2)}
.mg-sets{font-size:.78rem;color:var(--text-dim);background:var(--surface2);padding:3px 8px;border-radius:4px}
.ex-list{display:grid;gap:12px}
.ex{display:grid;grid-template-columns:100px 1fr;gap:0;background:var(--surface2);border-radius:8px;overflow:hidden;border:1px solid transparent;transition:border-color .2s,transform .2s}
.ex:hover{border-color:var(--border);transform:translateY(-1px)}
.ex-icon{width:100px;height:85px;display:flex;align-items:center;justify-content:center;background:#1a1a1a}
.ex-icon svg{width:78px;height:68px}
.ex-info{padding:12px 16px;display:flex;flex-direction:column;justify-content:center}
.ex-name{font-weight:600;font-size:.95rem;margin-bottom:2px}
.ex-rx{font-size:.85rem;color:var(--text-dim)}
.ex-rx strong{color:var(--accent);font-weight:600}
.rest{background:var(--surface);border:1px dashed var(--border);border-radius:12px;margin-bottom:28px;padding:24px;text-align:center;color:var(--text-dim);font-family:'Oswald',sans-serif;font-size:1.1rem;text-transform:uppercase;letter-spacing:2px}
.rest span{color:var(--green)}
.notes{background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--accent);border-radius:8px;padding:20px 24px;margin-top:10px}
.notes h3{font-family:'Oswald',sans-serif;font-size:1.1rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;color:var(--accent)}
.notes ul{list-style:none;padding:0}
.notes li{padding:5px 0 5px 18px;position:relative;color:var(--text-dim);font-size:.92rem;line-height:1.5}
.notes li::before{content:'\25B8';position:absolute;left:0;color:var(--accent)}
@media(max-width:600px){
  .ex{grid-template-columns:80px 1fr}.ex-icon{width:80px;height:70px}.ex-icon svg{width:64px;height:56px}
  .day-header{padding:16px}.day-content{padding:0 16px 16px}
}
</style>
</head>
<body>
<div class="hero">
  <h1>Dumbbell <span>Home</span> Program</h1>
  <p>Upper / Lower Split — 4 Days per Week — ~10 Sets per Muscle Group</p>

    <div class="stat"><div class="stat-value">4</div><div class="stat-label">Days / Week</div></div>

    <div class="stat"><div class="stat-value">~10</div><div class="stat-label">Sets / Muscle</div></div>
    <div class="stat"><div class="stat-value">🏠</div><div class="stat-label">Dumbbells Only</div></div>

</div>
